<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Type Tutor – Results Dashboard</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fredoka+One&family=Baloo+2:wght@500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/fab.css" />
    <link rel="stylesheet" href="css/sidebar.css" />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      :root {
        --g1: #2e7d52;
        --g2: #43a573;
        --g3: #7cc899;
        --g4: #b8e8cc;
        --sun: #f5a623;
        --sun2: #fbcb6a;
        --sky: #4a90d9;
        --sky2: #85bff0;
        --red: #d9534f;
        --red2: #f08c8a;
        --purple: #7b5ea7;
        --purple2: #b09fd4;
        --cream: #fdfaf4;
        --warm: #fff6e8;
        --card: #ffffff;
        --text: #1a2b1f;
        --muted: #6b7a6d;
        --light: #a8b8ac;
        --border: rgba(46, 125, 82, 0.15);
        --r: 16px;
        --r-lg: 24px;
        --r-xl: 32px;
        --sh: 0 4px 20px rgba(46, 125, 82, 0.1);
        --sh-md: 0 8px 32px rgba(46, 125, 82, 0.14);
        --sh-lg: 0 12px 48px rgba(46, 125, 82, 0.18);
      }
      html,
      body {
        min-height: 100%;
        font-family: "Nunito", sans-serif;
        background: linear-gradient(
          180deg,
          #87ceeb 0%,
          #b8e4f9 40%,
          #d4f0ff 100%
        );
        color: var(--text);
        font-size: 16px;
      }
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
        background:
          radial-gradient(
            ellipse 300px 120px at 10% 20%,
            rgba(255, 255, 255, 0.85) 0%,
            transparent 70%
          ),
          radial-gradient(
            ellipse 200px 80px at 30% 15%,
            rgba(255, 255, 255, 0.7) 0%,
            transparent 60%
          ),
          radial-gradient(
            ellipse 250px 100px at 70% 25%,
            rgba(255, 255, 255, 0.8) 0%,
            transparent 65%
          ),
          radial-gradient(
            ellipse 180px 70px at 88% 18%,
            rgba(255, 255, 255, 0.65) 0%,
            transparent 55%
          );
      }
      @keyframes bgPulse {
        0% {
          opacity: 0.7;
        }
        100% {
          opacity: 1;
        }
      }
      .bubbles {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
        overflow: hidden;
      }
      .bubble {
        position: absolute;
        border-radius: 50%;
        opacity: 0.06;
        animation: float linear infinite;
      }
      @keyframes float {
        0% {
          transform: translateY(100vh) scale(0);
        }
        100% {
          transform: translateY(-200px) scale(1);
        }
      }
      .page {
        max-width: 720px;
        margin: 0 auto;
        padding: 0 12px 80px;
        position: relative;
        z-index: 1;
      }
      .top-bar {
        background: rgba(255, 255, 255, 0.75);
        -webkit-backdrop-filter: blur(24px);
        backdrop-filter: blur(24px);
        border-bottom: 2px solid rgba(255, 255, 255, 0.5);
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 12px 20px;
        position: sticky;
        top: 0;
        z-index: 99;
      }
      .logo-wrap {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .logo-sun {
        width: 42px;
        height: 42px;
        border-radius: 50%;
        flex-shrink: 0;
        background: conic-gradient(
          var(--sun) 0 33%,
          var(--g3) 33% 66%,
          var(--sky) 66% 100%
        );
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 3px 12px rgba(245, 166, 35, 0.3);
        animation: spin 20s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      .logo-inner {
        width: 14px;
        height: 14px;
        border-radius: 50%;
        background: #fff;
      }
      .app-title {
        font-family: "Fredoka One", sans-serif;
        font-size: 22px;
        color: var(--g1);
        letter-spacing: 0.02em;
      }
      .app-sub {
        font-size: 10px;
        font-weight: 700;
        color: var(--muted);
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
      .results-home-link {
        display: flex;
        align-items: center;
        gap: 6px;
        background: rgba(46, 125, 82, 0.1);
        border: 2px solid rgba(46, 125, 82, 0.2);
        border-radius: 30px;
        padding: 7px 14px;
        text-decoration: none;
        font-family: "Nunito", sans-serif;
        font-size: 12px;
        font-weight: 800;
        color: #2e7d52;
        white-space: nowrap;
      }
      .lang-btn {
        display: flex;
        align-items: center;
        gap: 7px;
        background: rgba(46, 125, 82, 0.1);
        border: 2px solid rgba(46, 125, 82, 0.2);
        border-radius: 30px;
        padding: 7px 14px;
        cursor: pointer;
        font-family: "Nunito", sans-serif;
        font-size: 12px;
        font-weight: 800;
        color: var(--g1);
        transition: 0.2s;
        white-space: nowrap;
      }
      .lang-btn:hover {
        background: rgba(46, 125, 82, 0.18);
        border-color: var(--g2);
      }
      .rainbow {
        display: flex;
        height: 5px;
      }
      .r1 {
        flex: 1;
        background: linear-gradient(90deg, #ff6b6b, #ff8e53);
      }
      .r2 {
        flex: 1;
        background: linear-gradient(90deg, #ffd166, #fff176);
      }
      .r3 {
        flex: 1;
        background: linear-gradient(90deg, #06d6a0, #43a573);
      }
      .r4 {
        flex: 1;
        background: linear-gradient(90deg, #4a90d9, #74b9ff);
      }
      .r5 {
        flex: 1;
        background: linear-gradient(90deg, #9b59b6, #c39bd3);
      }
      .lang-overlay {
        display: none;
        position: fixed;
        inset: 0;
        z-index: 999;
        background: rgba(26, 43, 31, 0.55);
        -webkit-backdrop-filter: blur(8px);
        backdrop-filter: blur(8px);
        align-items: center;
        justify-content: center;
      }
      .lang-overlay.open {
        display: flex;
      }
      .lang-panel {
        background: var(--card);
        border-radius: var(--r-xl);
        width: min(500px, 94vw);
        box-shadow: var(--sh-lg);
        overflow: hidden;
        border: 2px solid var(--g4);
        animation: popIn 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
      }
      @keyframes popIn {
        from {
          transform: scale(0.85);
          opacity: 0;
        }
        to {
          transform: scale(1);
          opacity: 1;
        }
      }
      .lang-hd {
        background: linear-gradient(
          135deg,
          rgba(46, 125, 82, 0.1),
          rgba(124, 200, 153, 0.06)
        );
        padding: 16px 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 2px solid var(--g4);
      }
      .lang-hd-title {
        font-family: "Fredoka One", sans-serif;
        font-size: 20px;
        color: var(--g1);
      }
      .lang-close {
        background: none;
        border: 2px solid var(--border);
        border-radius: 50%;
        width: 32px;
        height: 32px;
        font-size: 16px;
        cursor: pointer;
        color: var(--muted);
        display: flex;
        align-items: center;
        justify-content: center;
        transition: 0.15s;
      }
      .lang-close:hover {
        background: var(--g4);
        color: var(--g1);
      }
      .lang-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
      }
      .lang-item {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 3px;
        padding: 18px 10px;
        cursor: pointer;
        border-right: 1px solid var(--border);
        border-bottom: 1px solid var(--border);
        transition: 0.15s;
        text-align: center;
        position: relative;
      }
      .lang-item:hover {
        background: rgba(124, 200, 153, 0.1);
      }
      .lang-item.sel {
        background: rgba(46, 125, 82, 0.1);
      }
      .lang-item.sel::after {
        content: "✓";
        position: absolute;
        top: 7px;
        right: 9px;
        font-size: 12px;
        color: var(--g1);
        font-weight: 900;
      }
      .lang-item:nth-child(3n) {
        border-right: none;
      }
      .lang-nat {
        font-size: 17px;
        font-weight: 800;
        color: var(--text);
      }
      .lang-eng {
        font-size: 10px;
        color: var(--muted);
        font-weight: 700;
      }
      .inner {
        padding: 16px 4px 0;
      }
      .sel-section {
        margin-bottom: 12px;
      }
      .sel-label {
        font-size: 11px;
        font-weight: 800;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.1em;
        margin-bottom: 8px;
      }
      .pills {
        display: flex;
        flex-wrap: wrap;
        gap: 7px;
      }
      .pill {
        padding: 8px 16px;
        border-radius: 30px;
        border: 2px solid var(--border);
        background: var(--card);
        font-size: 12px;
        font-weight: 800;
        cursor: pointer;
        font-family: "Nunito", sans-serif;
        color: var(--muted);
        transition: 0.18s;
      }
      .pill:hover {
        border-color: var(--g2);
        color: var(--g1);
        transform: translateY(-1px);
      }
      .pill.on {
        background: var(--g1);
        color: #fff;
        border-color: var(--g1);
        box-shadow: 0 4px 16px rgba(46, 125, 82, 0.35);
      }
      .pill.perfect {
        border-color: var(--g2);
        color: var(--g1);
      }
      .pill.on.perfect {
        background: var(--g2);
      }
      .pill.poor {
        border-color: var(--red);
        color: var(--red);
      }
      .pill.on.poor {
        background: var(--red);
        border-color: var(--red);
      }
      .result-card {
        background: transparent;
        border: none;
        border-radius: 28px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        overflow: hidden;
        margin-bottom: 18px;
      }
      .result-hero {
        padding: 48px 32px 40px;
        text-align: center;
        background: linear-gradient(
          160deg,
          #1a1a2e 0%,
          #16213e 35%,
          #0f3460 65%,
          #533483 100%
        );
        border-bottom: none;
        position: relative;
        overflow: hidden;
      }
      .result-hero::before {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
        background:
          radial-gradient(
            ellipse 70% 50% at 50% -10%,
            rgba(255, 200, 50, 0.22) 0%,
            transparent 60%
          ),
          radial-gradient(
            ellipse 40% 40% at 15% 85%,
            rgba(255, 120, 0, 0.15) 0%,
            transparent 55%
          ),
          radial-gradient(
            ellipse 40% 40% at 85% 85%,
            rgba(130, 60, 255, 0.18) 0%,
            transparent 55%
          );
      }
      .result-hero::after {
        content: "";
        position: absolute;
        width: 320px;
        height: 320px;
        border-radius: 50%;
        background: radial-gradient(
          circle,
          rgba(255, 200, 50, 0.07),
          transparent 70%
        );
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        pointer-events: none;
      }
      .stars-wrap {
        position: relative;
        z-index: 1;
        margin-bottom: 10px;
      }
      .stars {
        font-size: 72px;
        line-height: 1;
        display: block;
        animation: starPop 0.7s cubic-bezier(0.34, 1.56, 0.64, 1);
        filter: drop-shadow(0 0 20px rgba(255, 200, 50, 0.95))
          drop-shadow(0 4px 10px rgba(0, 0, 0, 0.5));
      }
      @keyframes starPop {
        0% {
          transform: scale(0) rotate(-20deg);
          opacity: 0;
        }
        70% {
          transform: scale(1.2) rotate(5deg);
        }
        100% {
          transform: scale(1) rotate(0);
          opacity: 1;
        }
      }
      .confetti-row {
        display: flex;
        justify-content: center;
        gap: 8px;
        margin-top: 8px;
        font-size: 22px;
        animation: fadeUp 0.5s 0.3s both;
      }
      @keyframes fadeUp {
        from {
          transform: translateY(10px);
          opacity: 0;
        }
        to {
          transform: translateY(0);
          opacity: 1;
        }
      }
      .result-msg {
        font-family: "Fredoka One", sans-serif;
        font-size: 42px;
        color: #fff;
        margin-bottom: 6px;
        position: relative;
        z-index: 1;
        animation: fadeUp 0.4s 0.1s both;
        text-shadow:
          0 0 30px rgba(255, 200, 50, 0.5),
          0 4px 14px rgba(0, 0, 0, 0.5);
      }
      .result-sub {
        font-size: 14px;
        font-weight: 700;
        color: rgba(255, 255, 255, 0.6);
        margin-bottom: 22px;
        position: relative;
        z-index: 1;
        animation: fadeUp 0.4s 0.2s both;
      }
      .big-acc {
        font-family: "Fredoka One", sans-serif;
        font-size: 100px;
        line-height: 1;
        display: block;
        letter-spacing: -0.02em;
        position: relative;
        z-index: 1;
        animation: accCount 0.8s 0.1s both;
      }
      @keyframes accCount {
        from {
          transform: scale(0.4);
          opacity: 0;
        }
        to {
          transform: scale(1);
          opacity: 1;
        }
      }
      .acc-g {
        background: linear-gradient(180deg, #7cff9b 0%, #2ecc71 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        filter: drop-shadow(0 4px 16px rgba(46, 204, 113, 0.6));
      }
      .acc-a {
        background: linear-gradient(
          180deg,
          #ffe566 0%,
          #ffb300 60%,
          #ff8c00 100%
        );
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        filter: drop-shadow(0 4px 16px rgba(255, 180, 0, 0.6));
      }
      .acc-r {
        background: linear-gradient(180deg, #ff8a80 0%, #d9534f 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        filter: drop-shadow(0 4px 16px rgba(217, 83, 79, 0.6));
      }
      .result-detail {
        font-size: 13px;
        font-weight: 800;
        color: rgba(255, 255, 255, 0.75);
        position: relative;
        z-index: 1;
        margin-top: 14px;
        background: rgba(255, 255, 255, 0.1);
        display: inline-block;
        padding: 8px 24px;
        border-radius: 24px;
        border: 1.5px solid rgba(255, 255, 255, 0.18);
        -webkit-backdrop-filter: blur(10px);
        backdrop-filter: blur(10px);
        letter-spacing: 0.03em;
      }
      .result-actions {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 18px 24px;
        background: linear-gradient(90deg, #16213e, #0f3460);
        border-top: 1px solid rgba(255, 255, 255, 0.07);
      }
      .btn-back {
        font-size: 13px;
        color: rgba(255, 255, 255, 0.5);
        background: none;
        border: none;
        cursor: pointer;
        font-family: "Nunito", sans-serif;
        font-weight: 800;
        text-decoration: none;
        transition: 0.15s;
      }
      .btn-back:hover {
        color: rgba(255, 255, 255, 0.9);
        text-decoration: underline;
      }
      .btns-r {
        display: flex;
        gap: 10px;
      }
      .btn-redo {
        padding: 12px 22px;
        border-radius: 14px;
        border: 1.5px solid rgba(255, 255, 255, 0.18);
        background: rgba(255, 255, 255, 0.08);
        font-size: 13px;
        font-weight: 800;
        cursor: pointer;
        font-family: "Nunito", sans-serif;
        color: rgba(255, 255, 255, 0.8);
        transition: 0.15s;
        -webkit-backdrop-filter: blur(8px);
        backdrop-filter: blur(8px);
      }
      .btn-redo:hover {
        background: rgba(255, 255, 255, 0.16);
        transform: translateY(-1px);
      }
      .btn-cont {
        padding: 12px 30px;
        border-radius: 14px;
        background: linear-gradient(135deg, #ffb300, #ff8c00);
        border: none;
        color: #1a1a2e;
        font-size: 14px;
        font-weight: 900;
        cursor: pointer;
        font-family: "Nunito", sans-serif;
        box-shadow: 0 6px 24px rgba(255, 160, 0, 0.55);
        transition: 0.15s;
        letter-spacing: 0.02em;
      }
      .btn-cont:hover {
        box-shadow: 0 8px 32px rgba(255, 160, 0, 0.7);
        transform: translateY(-2px);
      }
      .sec-hd {
        font-family: "Fredoka One", sans-serif;
        font-size: 20px;
        color: var(--g1);
        margin: 20px 0 12px;
        padding-left: 14px;
        border-left: 5px solid var(--sun);
        display: flex;
        align-items: center;
        gap: 9px;
      }
      .score-row {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 12px;
        margin-bottom: 16px;
      }
      .sbox {
        background: #fff;
        border: none;
        border-radius: 20px;
        padding: 24px 10px 20px;
        text-align: center;
        position: relative;
        overflow: hidden;
        transition: 0.2s;
        cursor: default;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.07);
      }
      .sbox:hover {
        transform: translateY(-4px);
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);
      }
      .sbox::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 6px;
        border-radius: 6px 6px 0 0;
      }
      .sbox.sg::before {
        background: linear-gradient(90deg, #2e7d52, #7cc899);
      }
      .sbox.ss::before {
        background: linear-gradient(90deg, #f5a623, #fbcb6a);
      }
      .sbox.sn::before {
        background: linear-gradient(90deg, #7b5ea7, #b09fd4);
      }
      .sbox-emoji {
        font-size: 32px;
        margin-bottom: 8px;
        display: block;
      }
      .sbox-num {
        font-family: "Fredoka One", sans-serif;
        font-size: 42px;
        line-height: 1;
        letter-spacing: -0.02em;
      }
      .sbox-lbl {
        font-size: 13px;
        font-weight: 800;
        color: var(--text);
        margin-top: 8px;
      }
      .sbox-sub {
        font-size: 10px;
        font-weight: 600;
        color: var(--light);
        margin-top: 3px;
      }
      .prog-card {
        background: #fff;
        border: none;
        border-radius: 20px;
        padding: 20px 24px;
        margin-bottom: 16px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.07);
      }
      .prog-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 14px;
      }
      .prog-title {
        font-family: "Fredoka One", sans-serif;
        font-size: 18px;
        color: var(--g1);
      }
      .prog-num {
        font-size: 13px;
        font-weight: 800;
        color: var(--muted);
      }
      .track {
        height: 16px;
        background: rgba(46, 125, 82, 0.08);
        border-radius: 12px;
        overflow: hidden;
        border: none;
        box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.06);
      }
      .fill {
        height: 16px;
        border-radius: 12px;
        background: linear-gradient(90deg, #2e7d52, #7cc899, #f5a623);
        transition: width 1.2s cubic-bezier(0.22, 0.68, 0, 1);
        box-shadow: 0 2px 8px rgba(46, 125, 82, 0.3);
      }
      .chart-card {
        background: #fff;
        border: none;
        border-radius: 20px;
        padding: 22px 20px 18px;
        margin-bottom: 16px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.07);
      }
      .mini-bars {
        display: flex;
        align-items: flex-end;
        gap: 8px;
        height: 80px;
        margin-bottom: 10px;
      }
      .mbar-col {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
        cursor: pointer;
        transition: 0.15s;
      }
      .mbar-col:hover {
        transform: scaleY(1.05);
        transform-origin: bottom;
      }
      .mbar {
        width: 100%;
        border-radius: 8px 8px 0 0;
        transition: 0.6s cubic-bezier(0.22, 0.68, 0, 1);
      }
      .mbar-lbl {
        font-size: 10px;
        color: var(--muted);
        font-weight: 800;
      }
      .chart-leg {
        font-size: 11px;
        color: var(--muted);
        font-weight: 700;
        display: flex;
        gap: 14px;
        flex-wrap: wrap;
      }
      .leg-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        display: inline-block;
        margin-right: 4px;
      }
      .what-list {
        display: flex;
        flex-direction: column;
        gap: 10px;
        margin-bottom: 14px;
      }
      .wcard {
        display: flex;
        gap: 14px;
        align-items: flex-start;
        background: var(--card);
        border-radius: var(--r-lg);
        padding: 16px 18px;

      // ─────────────────────────────────────────────────────
      // KEYBOARD & ANALYSIS ENGINE
      // ─────────────────────────────────────────────────────
      const KEY_FINGER = {
        a: "lp",
        q: "lp",
        z: "lp",
        s: "lr",
        w: "lr",
        x: "lr",
        d: "lm",
        e: "lm",
        c: "lm",
        f: "li",
        r: "li",
        v: "li",
        g: "li",
        t: "li",
        b: "li",
        " ": "th",
        j: "ri",
        u: "ri",
        m: "ri",
        h: "ri",
        n: "ri",
        k: "rm",
        i: "rm",
        l: "rr",
        o: "rr",
        ";": "rp",
        p: "rp",
      };
      const FINGER_COL = {
        lp: "#2E7D52",
        lr: "#43A573",
        lm: "#7CC899",
        li: "#D9534F",
        th: "#4A90D9",
        ri: "#F5A623",
        rm: "#7CC899",
        rr: "#43A573",
        rp: "#2E7D52",
      };
      const KEY_POS = {
        1: [0, 0],
        2: [1, 0],
        3: [2, 0],
        4: [3, 0],
        5: [4, 0],
        6: [5, 0],
        7: [6, 0],
        8: [7, 0],
        9: [8, 0],
        0: [9, 0],
        q: [0, 1],
        w: [1, 1],
        e: [2, 1],
        r: [3, 1],
        t: [4, 1],
        y: [5, 1],
        u: [6, 1],
        i: [7, 1],
        o: [8, 1],
        p: [9, 1],
        a: [0, 2],
        s: [1, 2],
        d: [2, 2],
        f: [3, 2],
        g: [4, 2],
        h: [5, 2],
        j: [6, 2],
        k: [7, 2],
        l: [8, 2],
        ";": [9, 2],
        z: [0, 3],
        x: [1, 3],
        c: [2, 3],
        v: [3, 3],
        b: [4, 3],
        n: [5, 3],
        m: [6, 3],
        " ": [4.5, 4.5],
      };
      const ROW_STAGGER = [0, 0.5, 0.75, 1.1, 0];
      const KBD_ROWS = [
        ["q", "w", "e", "r", "t", "y", "u", "i", "o", "p"],
        ["a", "s", "d", "f", "g", "h", "j", "k", "l", ";"],
        ["z", "x", "c", "v", "b", "n", "m"],
      ];

      function keyDist(a, b) {
        const pa = KEY_POS[a],
          pb = KEY_POS[b];
        if (!pa || !pb) return 6;
        const ax = pa[0] + (ROW_STAGGER[Math.round(pa[1])] || 0);
        const bx = pb[0] + (ROW_STAGGER[Math.round(pb[1])] || 0);
        return Math.sqrt((ax - bx) ** 2 + ((pa[1] - pb[1]) * 1.05) ** 2);
      }
      function handOf(k) {
        const f = KEY_FINGER[k];
        return f ? (f.startsWith("l") ? "L" : "R") : null;
      }
      function classifyProx(exp, typed) {
        if (!KEY_POS[exp] || !KEY_POS[typed])
          return {
            cat: "major",
            dist: 6,
            reason: "Unknown position",
            sameHand: false,
          };
        const dist = keyDist(exp, typed);
        const eH = handOf(exp),
          tH = handOf(typed);
        const sameHand = eH && tH && eH === tH;
        let cat, reason;
        if (dist <= 1.6) {
          cat = "minor";
          reason = "Adjacent key — finger slipped 1 step";
        } else if (dist <= 3.5 && sameHand) {
          cat = "moderate";
          reason =
            "Same hand, reached too far (" +
            (eH === "L" ? "Left" : "Right") +
            ")";
        } else if (!sameHand && eH && tH) {
          cat = "major";
          reason =
            "Wrong hand — should use " +
            (eH === "L" ? "Left" : "Right") +
            " hand";
        } else {
          cat = "major";
          reason = "Large motor leap across keyboard";
        }
        return {
          cat,
          dist: Math.round(dist * 10) / 10,
          reason,
          sameHand,
          eH,
          tH,
        };
      }

      function analyse(att) {
        const total = att.length;
        const correct = att.filter((k) => k[1] === 1).length;
        const errs = att.filter((k) => k[1] === 0);
        const acc = total ? Math.round((correct / total) * 1000) / 10 : 0;
        const fErr = {};
        errs.forEach((k) => {
          const f = KEY_FINGER[k[0]] || "?";
          fErr[f] = (fErr[f] || 0) + 1;
        });
        const pm = {};
        errs.forEach((k) => {
          if (k[2]) {
            const key = k[0] + "→" + k[2];
            pm[key] = (pm[key] || 0) + 1;
          }
        });
        const topPairs = Object.entries(pm)
          .sort((a, b) => b[1] - a[1])
          .slice(0, 5);
        let persev = 0,
          i = 0;
        while (i < att.length) {
          if (att[i][1] === 0) {
            const wk = att[i][2],
              ek = att[i][0];
            let r = 1,
              nx = i + 1;
            while (
              nx < att.length &&
              att[nx][1] === 0 &&
              att[nx][2] === wk &&
              att[nx][0] === ek
            ) {
              r++;
              nx++;
            }
            if (r >= 2) persev += r;
          }
          i++;
        }
        let burst = 0;
        const ep = att
          .map((k, idx) => (k[1] === 0 ? idx : -1))
          .filter((x) => x >= 0);
        for (let j = 1; j < ep.length; j++) {
          if (ep[j] - ep[j - 1] <= 3) burst++;
        }
        const errPairs = att.filter((k) => k[1] === 0 && k[2] && k[0] !== " ");
        const classified = errPairs.map((k) => ({
          exp: k[0],
          typed: k[2],
          ...classifyProx(k[0], k[2]),
        }));
        const minor = classified.filter((c) => c.cat === "minor").length;
        const moderate = classified.filter((c) => c.cat === "moderate").length;
        const major = classified.filter((c) => c.cat === "major").length;
        const pairMap = {};
        classified.forEach((c) => {
          const key = c.exp + "->" + c.typed;
          if (!pairMap[key]) pairMap[key] = { ...c, count: 0 };
          pairMap[key].count++;
        });
        const topProxPairs = Object.values(pairMap)
          .sort((a, b) => b.count - a.count)
          .slice(0, 5);
        const heatmap = {};
        classified.forEach((c) => {
          if (!heatmap[c.typed]) heatmap[c.typed] = { count: 0, cat: c.cat };
          heatmap[c.typed].count++;
          const rank = { minor: 0, moderate: 1, major: 2 };
          if (rank[c.cat] > rank[heatmap[c.typed].cat])
            heatmap[c.typed].cat = c.cat;
        });
        const expectedErr = {};
        classified.forEach((c) => {
          expectedErr[c.exp] = true;
        });
        const errorPositions = att
          .map((k, idx) => (k[1] === 0 ? idx / total : null))
          .filter((x) => x !== null);
        const avgErrPos = errorPositions.length
          ? errorPositions.reduce((a, b) => a + b, 0) / errorPositions.length
          : 0;
        const fatigue = avgErrPos > 0.6 && errs.length > 3;
        return {
          total,
          correct,
          errors: errs.length,
          acc,
          fErr,
          topPairs,
          persev,
          burst,
          proxMinor: minor,
          proxModerate: moderate,
          proxMajor: major,
          topProxPairs,
          heatmap,
          expectedErr,
          proxTotal: classified.length,
          fatigue,
        };
      }

      function gradeOf(acc, L) {
        const g = L.grades;
        if (acc === 100) return g[100];
        if (acc >= 90) return g[90];
        if (acc >= 70) return g[70];
        if (acc >= 50) return g[50];
        return g[0];
      }
      function accCls(acc) {
        return acc >= 90 ? "acc-g" : acc >= 60 ? "acc-a" : "acc-r";
      }

      function buildWorkCards(s, L) {
        const W = L.wc,
          c = [];
        if (s.acc === 100) {
          c.push(W.perfect);
          return c;
        }
        if ((s.fErr.li || 0) >= 3) c.push(W.findex);
        if ((s.fErr.th || 0) >= 3) c.push(W.space);
        if (s.persev >= 4) c.push(W.persev4);
        else if (s.persev >= 2) c.push(W.persev2);
        if (s.burst >= 4) c.push(W.burst);
        if (s.total > 60 && s.acc < 88) c.push(W.long);
        if (s.topPairs.length) {
          const [pair, cnt] = s.topPairs[0];
          const [exp, typed] = pair.split("→");
          const es = exp === " " ? "SPACE" : exp.toUpperCase();
          const ts = typed === " " ? "SPACE" : typed.toUpperCase();
          c.push({
            t: "info",
            i: "⌨️",
            h: `"${es}" → "${ts}"`,
            d: `The key "${es}" was typed as "${ts}" ${cnt} time${cnt > 1 ? "s" : ""} — these two keys are being confused. Highlight the correct key visually and practise it in isolation before the next full exercise.`,
          });
        }
        if (!c.length)
          c.push({
            ...W.good,
            d:
              W.good.d ||
              `${s.errors} ${s.errors !== 1 ? L.mistakes2 : L.mistake} — keep working steadily!`,
          });
        return c;
      }

      // Proximity HTML — uses L for all labels
      function buildProxHtml(att, L) {
        const s = analyse(att);
        if (s.proxTotal === 0) return "";
        const MAX_DIST = 5.5;
        const summaryHtml = `<div class="prox-summary">
    <div class="prox-box minor">
      <div class="prox-cat-label">${L.proxMinorLabel}</div>
      <div class="prox-count">${s.proxMinor}</div>
      <div class="prox-box-desc">${L.proxMinorDesc}</div>
    </div>
    <div class="prox-box moderate">
      <div class="prox-cat-label">${L.proxModLabel}</div>
      <div class="prox-count">${s.proxModerate}</div>
      <div class="prox-box-desc">${L.proxModDesc}</div>
    </div>
    <div class="prox-box major">
      <div class="prox-cat-label">${L.proxMajorLabel}</div>
      <div class="prox-count">${s.proxMajor}</div>
      <div class="prox-box-desc">${L.proxMajorDesc}</div>
    </div>
  </div>`;
        const pairRows = s.topProxPairs
          .map((pair) => {
            const eK = pair.exp === " " ? "␣" : pair.exp.toUpperCase();
            const tK = pair.typed === " " ? "␣" : pair.typed.toUpperCase();
            const pct = Math.min(100, Math.round((pair.dist / MAX_DIST) * 100));
            const barCol =
              pair.cat === "minor"
                ? "#43A573"
                : pair.cat === "moderate"
                  ? "#F5A623"
                  : "#D9534F";
            return `<div class="prox-item ${pair.cat}">
      <div class="prox-keys">
        <div class="prox-key exp">${eK}</div>
        <span class="prox-arrow-sm">→</span>
        <div class="prox-key wrong">${tK}</div>
      </div>
      <div class="prox-info">
        <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;">
          <span class="chip chip-${pair.cat}">${pair.cat}</span>
          <span class="prox-title">×${pair.count}</span>
        </div>
        <div class="prox-sub">${pair.reason}</div>
        <div class="prox-bar-bg"><div class="prox-bar-fill" style="width:${pct}%;background:${barCol};"></div></div>
      </div>
      <div class="prox-dist">
        <div class="prox-dist-num dist-${pair.cat}">${pair.dist}</div>
        <div class="prox-dist-lbl">${L.proxKeyDist}</div>
      </div>
    </div>`;
          })
          .join("");
        const kbdHtml = KBD_ROWS.map((row) => {
          const keys = row
            .map((k) => {
              let cls = "",
                badge = "";
              if (s.heatmap[k]) {
                cls = "k-" + s.heatmap[k].cat;
                badge = `<span class="badge">${s.heatmap[k].count}</span>`;
              } else if (s.expectedErr[k]) {
                cls = "k-exp";
              }
              return `<div class="k ${cls}">${k.toUpperCase()}${badge}</div>`;
            })
            .join("");
          return `<div class="kbd-row">${keys}</div>`;
        }).join("");
        return `<div class="sec-hd">${L.proxTitle}</div>
    ${summaryHtml}
    ${s.topProxPairs.length ? `<div class="prox-list">${pairRows}</div>` : ""}
    <div class="kbd-card">
      <div class="kbd-title">${L.kbdTitle}</div>
      <div class="kbd-rows">
        ${kbdHtml}
        <div class="kbd-row"><div class="k k-space">SPACE</div></div>
      </div>
      <div class="kbd-legend">
        <div class="kleg"><div class="kleg-dot" style="background:rgba(46,125,82,.4);"></div>${L.kbdLegExpected}</div>
        <div class="kleg"><div class="kleg-dot" style="background:#43A573;"></div>${L.kbdLegMinor}</div>
        <div class="kleg"><div class="kleg-dot" style="background:#F5A623;"></div>${L.kbdLegMod}</div>
        <div class="kleg"><div class="kleg-dot" style="background:#D9534F;"></div>${L.kbdLegMajor}</div>
      </div>
    </div>`;
      }

      function buildTrend(allS, L) {
        if (allS.length < 2) return "";
        const accs = allS.map((s) => s.acc);
        const best = Math.max(...accs);
        const worst = Math.min(...accs);
        const avg =
          Math.round((accs.reduce((a, b) => a + b, 0) / accs.length) * 10) / 10;
        const recent = accs.slice(-3);
        const older = accs.slice(0, Math.max(1, accs.length - 3));
        const recentAvg = recent.reduce((a, b) => a + b, 0) / recent.length;
        const olderAvg = older.reduce((a, b) => a + b, 0) / older.length;
        const delta = Math.round((recentAvg - olderAvg) * 10) / 10;
        const improving = delta > 2,
          declining = delta < -2;
        const trend = improving
          ? `<span class="up">↑ +${delta}% — ${L.improving}</span>`
          : declining
            ? `<span class="dn">↓ ${delta}% — ${L.declining}</span>`
            : `<span class="flat">→ ${L.stable}</span>`;
        const totalErrors = allS.reduce((a, b) => a + b.errors, 0);
        return `<div class="sec-hd">${L.trendTitle}</div>
  <div class="trend-card">
    <div class="trend-row">
      <div class="trend-stat"><div class="trend-stat-num">${avg}%</div><div class="trend-stat-lbl">${L.trendAvg}</div><div class="trend-delta">${trend}</div></div>
      <div class="trend-stat"><div class="trend-stat-num" style="color:var(--g1)">${best}%</div><div class="trend-stat-lbl">${L.trendBest}</div></div>
      <div class="trend-stat"><div class="trend-stat-num" style="color:var(--red)">${worst}%</div><div class="trend-stat-lbl">${L.trendWorst}</div></div>
      <div class="trend-stat"><div class="trend-stat-num" style="color:var(--purple)">${totalErrors}</div><div class="trend-stat-lbl">${L.trendErrors}</div></div>
    </div>
  </div>`;
      }

      // ─────────────────────────────────────────────────────
      // TYPING DATA
      // ─────────────────────────────────────────────────────
      const TYPING_DATA = { results: {} };

      // ─────────────────────────────────────────────────────
      // LANGUAGE UI
      // ─────────────────────────────────────────────────────
      let curLang = "en",
        curLevel = "",
        curAtt = 0;

      function buildLangGrid() {
        document.getElementById("lang-grid").innerHTML = LANGS.map(
          (l) => `
    <div class="lang-item ${l.code === curLang ? "sel" : ""}" onclick="selectLang('${l.code}')">
      <div class="lang-nat">${l.native}</div>
      <div class="lang-eng">${l.english}</div>
    </div>`,
        ).join("");
      }
      function openLang() {
        buildLangGrid();
        document.getElementById("lang-overlay").classList.add("open");
      }
      function closeLang() {
        document.getElementById("lang-overlay").classList.remove("open");
      }
      function closeLangBg(e) {
        if (e.target === document.getElementById("lang-overlay")) closeLang();
      }
      function selectLang(code) {
        curLang = code;
        const m = LANGS.find((l) => l.code === code);
        document.getElementById("lang-flag").textContent = m.flag;
        document.getElementById("lang-name").textContent = m.native;
        closeLang();
        render();
      }

      // ─────────────────────────────────────────────────────
      // MAIN RENDER
      // ─────────────────────────────────────────────────────
      function render() {
        const L = LANG[curLang] || LANG.en;
        const data = TYPING_DATA.results;
        const levels = Object.keys(data).filter(
          (l) => Array.isArray(data[l]) && data[l].length > 0,
        );

        document.getElementById("hdr-title").textContent = L.hdrTitle;
        document.getElementById("hdr-sub").textContent = L.hdrSub;
        document.getElementById("f-org").textContent = L.footerOrg;
        document.getElementById("f-prog").textContent = L.footerProg;
        document.getElementById("picker-title").textContent =
          L.pickerTitle || "🌐 Choose Language";

        if (!levels.length) {
          document.getElementById("app").innerHTML =
            `<div style="text-align:center;padding:60px 20px;font-size:18px;font-weight:800;color:var(--muted);">No results yet!<br><br>Complete a level first, then come back here to see your full analysis.<br><br><a href="home.html" style="color:var(--g1);text-decoration:underline;">← Go to Levels</a></div>`;
          return;
        }

        if (!levels.includes(curLevel)) curLevel = levels[levels.length - 1];
        const atts = data[curLevel];
        if (curAtt >= atts.length) curAtt = 0;
        const s = analyse(atts[curAtt]);
        const g = gradeOf(s.acc, L);
        const allS = atts.map((a) => analyse(a));
        const goodCnt = allS.filter((x) => x.acc >= 90).length;
        const pct = Math.round((goodCnt / atts.length) * 100);

        document.getElementById("hdr-title").textContent = L.hdrTitle;
        document.getElementById("hdr-sub").textContent = L.hdrSub;
        document.getElementById("f-org").textContent = L.footerOrg;
        document.getElementById("f-prog").textContent = L.footerProg;
        document.getElementById("picker-title").textContent =
          L.pickerTitle || "🌐 Choose Language";

        const lvlP = levels
          .map(
            (l) =>
              `<button class="pill ${l === curLevel ? "on" : ""}" onclick="sL('${l}')">${l.replace("level", "Level ")}</button>`,
          )
          .join("");
        const attP = atts
          .map((_, i) => {
            const ss = allS[i];
            const cls = ss.acc === 100 ? "perfect" : ss.acc < 60 ? "poor" : "";
            return `<button class="pill ${cls} ${i === curAtt ? "on" : ""}" onclick="sA(${i})">${L.try} ${i + 1}<br><small style="font-size:9px;opacity:.8">${ss.acc}%</small></button>`;
          })
          .join("");

        const fE = Object.entries(s.fErr).sort((a, b) => b[1] - a[1]);
        const mxF = Math.max(1, ...fE.map((e) => e[1]));
        const fHtml =
          fE
            .map(
              ([f, cnt]) => `
    <div class="fcard">
      <div class="fdot" style="background:${FINGER_COL[f] || "#888"}"></div>
      <div class="finfo">
        <div class="fname" style="color:${FINGER_COL[f] || "var(--text)"}">${L.fingerFull[f] || f}</div>
        <div class="fkey-lbl">${L.fingers?.[f] || f} · ${cnt} ${cnt > 1 ? L.mistakes2 : L.mistake}</div>
        <div class="fbar-bg"><div class="fbar" style="width:${Math.round((cnt / mxF) * 100)}%;background:${FINGER_COL[f] || "#888"}"></div></div>
      </div>
    </div>`,
            )
            .join("") ||
          `<p style="font-size:14px;font-weight:800;color:var(--muted);padding:6px 0">${L.noFinger}</p>`;

        const mkH =
          s.topPairs
            .map(([pair, cnt]) => {
              const [exp, typed] = pair.split("→");
              const es = exp === " " ? "␣" : exp.toUpperCase();
              const ts = typed === " " ? "␣" : typed.toUpperCase();
              const isCross =
                KEY_FINGER[exp] &&
                KEY_FINGER[typed] &&
                KEY_FINGER[exp].charAt(0) !== KEY_FINGER[typed].charAt(0) &&
                KEY_FINGER[exp] !== "th";
              const lbl =
                exp === " "
                  ? L.mkLabels.space
                  : isCross
                    ? L.mkLabels.cross
                    : L.mkLabels.slip;
              return `<div class="mk-item">
      <div class="mk-keys"><div class="mk-key">${es}</div><div class="mk-arrow">→</div><div class="mk-key wrong">${ts}</div></div>
      <div class="mk-body"><div class="mk-main">${lbl}</div><div class="mk-sub">${L.mkSub(es, ts)}</div></div>
      <div class="mk-cnt">${cnt}×</div>
    </div>`;
            })
            .join("") ||
          `<p style="font-size:14px;font-weight:800;color:var(--muted);padding:4px 0">${L.noMix}</p>`;

        const bars = allS
          .map((ss, i) => {
            const h = Math.max(8, Math.round((ss.acc / 100) * 72));
            const col =
              ss.acc === 100 ? "#2E7D52" : ss.acc >= 70 ? "#43A573" : "#D9534F";
            const brd =
              i === curAtt
                ? "outline:3px solid #2E7D52;outline-offset:2px;border-radius:8px 8px 0 0;"
                : "";
            return `<div class="mbar-col" onclick="sA(${i})" title="Try ${i + 1}: ${ss.acc}%">
      <div class="mbar" style="height:${h}px;background:${col};${brd}"></div>
      <div class="mbar-lbl">T${i + 1}</div>
    </div>`;
          })
          .join("");

        const wcH = buildWorkCards(s, L)
          .map(
            (c) => `
    <div class="wcard ${c.t}">
      <div class="wcard-icon">${c.i}</div>
      <div><div class="wcard-title">${c.h}</div><div class="wcard-desc">${c.d}</div></div>
    </div>`,
          )
          .join("");

        const tlH = (L.tl ? L.tl(s) : []).map((l) => `<li>${l}</li>`).join("");
        const tipsH = (L.tips || LANG.en.tips)
          .map(
            (t) =>
              `<div class="tip"><div class="tip-icon">${t.i}</div><div>${t.t}</div></div>`,
          )
          .join("");
        const trendH = buildTrend(allS, L);
        const proxH = buildProxHtml(atts[curAtt], L);

        const fatigueH = s.fatigue
          ? `<div class="wcard warn" style="margin-bottom:10px">
    <div class="wcard-icon">😴</div>
    <div><div class="wcard-title">${L.fatigueTitle}</div>
    <div class="wcard-desc">${L.fatigueDesc}</div></div>
  </div>`
          : "";

        document.getElementById("app").innerHTML = `
    <div class="sel-section"><div class="sel-label">${L.chooseLevel}</div><div class="pills">${lvlP}</div></div>
    <div class="sel-section"><div class="sel-label">${L.chooseTry}</div><div class="pills">${attP}</div></div>

    <div class="result-card">
      <div class="result-hero">
        <div class="stars-wrap">
          <span class="stars">${g.stars}</span>
          <div class="confetti-row">${(g.confetti || "").split("").join(" ")}</div>
        </div>
        <div class="result-msg">${g.msg}</div>
        <div class="result-sub">${g.sub}</div>
        <span class="big-acc ${accCls(s.acc)}">${s.acc}%</span>
        <div class="result-detail">${s.correct} ${L.correct} &nbsp;·&nbsp; ${s.errors} ${s.errors !== 1 ? L.mistakes2 : L.mistake} &nbsp;·&nbsp; ${s.total} ${L.total}</div>
      </div>
      <div class="result-actions">
        <a class="btn-back" href="home.html">${L.backLessons}</a>
        <div class="btns-r">
          <button class="btn-redo" onclick="sA(${curAtt})">${L.redo}</button>
          <button class="btn-cont" onclick="(function(){var n=parseInt('${curLevel}'.replace(/\\D/g,''),10);window.location.href='levels/level'+(n+1)+'.html';})();">${L.continueBtn}</button>
        </div>
      </div>
    </div>

    <div class="prog-card">
      <div class="prog-row">
        <span class="prog-title">${L.progressTitle}</span>
        <span class="prog-num">${goodCnt}/${atts.length} ${L.progressSuffix}</span>
      </div>
      <div class="track"><div class="fill" style="width:${pct}%"></div></div>
    </div>

    <div class="score-row">
      <div class="sbox sg">
        <span class="sbox-emoji">${s.acc === 100 ? "🌟" : s.acc >= 70 ? "😊" : "😟"}</span>
        <div class="sbox-num ${accCls(s.acc)}">${s.acc}%</div>
        <div class="sbox-lbl">${L.accuracy}</div>
        <div class="sbox-sub">${L.accuracySub}</div>
      </div>
      <div class="sbox ss">
        <span class="sbox-emoji">${s.errors === 0 ? "✅" : s.errors < 5 ? "⚠️" : "❌"}</span>
        <div class="sbox-num ${s.errors === 0 ? "acc-g" : s.errors < 5 ? "acc-a" : "acc-r"}">${s.errors}</div>
        <div class="sbox-lbl">${L.mistakes}</div>
        <div class="sbox-sub">${L.mistakesSub}</div>
      </div>
      <div class="sbox sn">
        <span class="sbox-emoji">${s.persev === 0 ? "🙌" : s.persev < 4 ? "🤔" : "🔁"}</span>
        <div class="sbox-num ${s.persev === 0 ? "acc-g" : s.persev < 4 ? "acc-a" : "acc-r"}">${s.persev === 0 ? L.none : s.persev}</div>
        <div class="sbox-lbl">${L.stuck}</div>
        <div class="sbox-sub">${L.stuckSub}</div>
      </div>
    </div>

    ${fatigueH}

    <div class="sec-hd">${L.workTitle}</div>
    <div class="what-list">${wcH}</div>

    <div class="sec-hd">${L.allTries}</div>
    <div class="chart-card">
      <div class="mini-bars">${bars}</div>
      <div class="chart-leg">
        <span><span class="leg-dot" style="background:#2E7D52"></span>≥ 90%</span>
        <span><span class="leg-dot" style="background:#43A573"></span>70–89%</span>
        <span><span class="leg-dot" style="background:#D9534F"></span>&lt; 70%</span>
        <span style="margin-left:auto;font-size:10px;opacity:.7">${L.chartLegend}</span>
      </div>
    </div>

    ${trendH}

    ${fE.length ? `<div class="sec-hd">${L.fingerTitle}</div><div class="finger-grid">${fHtml}</div>` : ""}
    ${s.topPairs.length ? `<div class="sec-hd">${L.mixTitle}</div><div class="mk-list">${mkH}</div>` : ""}

    ${proxH}

    <div class="sec-hd">${L.teacherTitle}</div>
    <div class="teacher-card">
      <div class="teacher-title">${L.teacherCard}</div>
      <div class="teacher-body"><ul>${tlH}</ul></div>
    </div>

    <div class="sec-hd">${L.tipsTitle}</div>
    <div class="tips-card">
      <div class="tips-title">${L.tipsTitle}</div>
      ${tipsH}
    </div>
  `;
      }

      function sA(i) {
        curAtt = i;
        render();
      }
      function sL(l) {
        curLevel = l;
        curAtt = 0;
        render();
      }

      window.addEventListener("message", (e) => {
        if (e.data && e.data.type === "SHOW_RESULTS") {
          if (e.data.attempts)
            TYPING_DATA.results[e.data.level || "level1"] = e.data.attempts;
          if (e.data.level) curLevel = e.data.level;
          render();
        }
      });

      // ── Step 1: Load real data from localStorage FIRST ────────
      try {
        const profileId = localStorage.getItem("vv_activeProfile");
        const storageKey = profileId
          ? "vv_typingResults_" + profileId
          : "typingResults";
        const sv = localStorage.getItem(storageKey);
        if (sv) {
          const d = JSON.parse(sv);
          if (d && d.results) {
            Object.keys(d.results).forEach(function (k) {
              if (Array.isArray(d.results[k]) && d.results[k].length > 0) {
                TYPING_DATA.results[k] = d.results[k];
              }
            });
          }
        }
      } catch (e) {}

      // ── Step 2: Auto-select the correct level ─────────────────
      (function () {
        const levels = Object.keys(TYPING_DATA.results).filter(function (l) {
          return (
            Array.isArray(TYPING_DATA.results[l]) &&
            TYPING_DATA.results[l].length > 0
          );
        });
        // URL hash takes priority e.g. results.html#level3
        const hash = window.location.hash.replace("#", "");
        if (hash && levels.includes(hash)) {
          curLevel = hash;
        } else if (levels.length > 0) {
          // Pick highest level number played
          const sorted = levels.slice().sort(function (a, b) {
            return (
              parseInt(a.replace(/\D/g, ""), 10) -
              parseInt(b.replace(/\D/g, ""), 10)
            );
          });
          curLevel = sorted[sorted.length - 1];
        }
        curAtt = 0;
      })();

      // ── Step 3: Render ────────────────────────────────────────
      render();
    </script>
    <script src="js/fab.js"></script>
    <script src="js/sidebar.js"></script>
  </body>
</html>
