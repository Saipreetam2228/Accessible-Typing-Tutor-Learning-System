       TOPIC PICKER STYLES
       ALL rules are scoped to #screenMode so they cannot

  ════════════════════════════════════════════════════════ -->
  <style>

    /* ── CSS variables (light default / dark override) ──── */
    :root {
      --sky-top:        #8ec5ff;
      --sky-mid-1:      #b7d8ff;
      --sky-mid-2:      #ffd6e7;
      --sky-bottom:     #ffe7c9;
      --header-bg:      rgba(255,255,255,0.20);
      --header-border:  rgba(255,255,255,0.45);
      --text-primary:   #2c3e50;
      --text-secondary: #666;
      --card-bg:        rgba(228,244,255,0.88);
      --card-border:    rgba(255,255,255,0.55);
    }
    body.dark-mode {
      --sky-top:        #0a1627;
      --sky-mid-1:      #1a2a4a;
      --sky-mid-2:      #2a3a5a;
      --sky-bottom:     #1a2a4a;
      --header-bg:      rgba(20,30,60,0.40);
      --header-border:  rgba(150,180,255,0.25);
      --text-primary:   #e0e0e0;
      --text-secondary: #a0a0a0;
      --card-bg:        rgba(20,40,80,0.60);
      --card-border:    rgba(100,150,255,0.30);
    }

    /* ── Base reset ──────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100vh; overflow: hidden; font-family: "ABeeZee", sans-serif; }

    /* ── Sky gradient background ─────────────────────────── */
    .sky-gradient {
      position: fixed; inset: 0; z-index: -2; pointer-events: none;
      background: linear-gradient(180deg,
        var(--sky-top), var(--sky-mid-1) 30%, var(--sky-mid-2) 70%, var(--sky-bottom));
      transition: background 2s cubic-bezier(0.4,0,0.2,1);
    }

    /* ── Stars ───────────────────────────────────────────── */
    .stars-container {
      position: fixed; inset: 0; z-index: -1; pointer-events: none;
      opacity: 0; transition: opacity 2s ease-in-out;
    }
    body.dark-mode .stars-container { opacity: 1; }
    .star {
      position: absolute;
      left: var(--tx); top: var(--ty);
      font-size: var(--fs, 1rem);
      color: rgba(255,255,255,0.6);
      animation: twinkle var(--td,3s) ease-in-out var(--dl,0s) infinite;
    }
    @keyframes twinkle {
      0%,100% { opacity: 0.3; }
      50%      { opacity: 1;   }
    }

    /* ── Clouds ──────────────────────────────────────────── */
    .cloud {
      position: fixed; pointer-events: none; z-index: -1; height: auto;
      opacity: 0.85;
      animation: floatCloud var(--cd,22s) ease-in-out infinite;
      transition: opacity 2s ease-in-out;
    }
    img.cloud { width: clamp(80px,12vw,180px); }
    .cloud1 { top:10vh; left:6vw;   --cd:22s; }
    .cloud2 { top:12vh; right:6vw;  --cd:24s; }
    .cloud3 { top:22vh; left:18vw;  --cd:26s; }
    .cloud4 { top:24vh; right:18vw; --cd:20s; }
    @keyframes floatCloud {
      0%,100% { transform: translateX(-40px); }
      50%     { transform: translateX( 40px); }
    }

    /* ── Header ──────────────────────────────────────────── */
    .top-header {
      position: fixed; top: clamp(8px,1.5vh,20px); left: 50%; transform: translateX(-50%);
      z-index: 20; width: clamp(260px,92vw,1200px); height: clamp(50px,8vh,90px);
      display: flex; align-items: center; justify-content: space-between;
      background: var(--header-bg); border: 1.5px solid var(--header-border);
      border-radius: clamp(12px,2vh,24px);
      padding: clamp(8px,1.5vh,15px) clamp(16px,3vw,32px);
      backdrop-filter: blur(14px);
      transition: background 1.5s ease, border-color 1.5s ease;
    }
    .header-logo {
      width: clamp(30px,4vw,60px); height: auto;
      transition: filter 1s ease-in-out;
    }
    body.dark-mode .header-logo { filter: drop-shadow(0 0 8px rgba(107,157,255,0.4)); }
    .header-title { flex: 1; text-align: center; margin: 0 20px; }
    .header-title h1 {
      font-size: clamp(1rem,2.5vw,1.8rem); font-weight: 700;
      color: var(--text-primary); margin-bottom: 2px;
      transition: color 1.5s ease-in-out;
    }
    .header-title p {
      font-size: clamp(0.65rem,1.2vw,0.9rem);
      color: var(--text-secondary); letter-spacing: 2px;
      transition: color 1.5s ease-in-out;
    }

    /* Theme toggle buttons removed — handled by FAB */

    /* ── Wrapper ─────────────────────────────────────────── */
    .main-wrapper {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      z-index: 1; overflow: hidden;
    }

    /* ── Topic picker screen ─────────────────────────────── */
    #screenMode {
      position: absolute; inset: 0; z-index: 10;
      display: flex; align-items: flex-start; justify-content: center;
      padding-top: clamp(80px,14vh,140px);
      overflow-y: auto;
    }

    /* ── Center area ─────────────────────────────────────── */
    #screenMode .center-area {
      width: 100%; max-width: 940px;
      margin: 0 auto; padding: 0 20px 40px;
      display: flex; flex-direction: column;
      align-items: center; gap: 24px;
    }

    /* ── Heading + subtext ───────────────────────────────── */
    #screenMode .topic-section { text-align: center; width: 100%; }
    #screenMode .topic-section h2 {
      font-size: clamp(1.5rem,3vw,2.2rem);
      color: var(--text-primary); margin-bottom: 10px;
      transition: color 1.5s ease-in-out;
    }
    #screenMode .topic-section p {
      font-size: clamp(0.95rem,1.5vw,1.1rem);
      color: var(--text-secondary); margin-bottom: 28px;
      transition: color 1.5s ease-in-out;
    }

    /* ── Topic grid ──────────────────────────────────────── */
    #screenMode .topic-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px,1fr));
      gap: 20px;
      width: 100%;
      margin-bottom: 24px;
    }

    /* ── Topic card (the box) ────────────────────────────── */
    #screenMode .topic-card {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: var(--card-bg);
      border: 2px solid var(--card-border);
      border-radius: 18px;
      padding: 22px 12px 16px;
      gap: 10px;
      cursor: pointer;
      box-shadow: 0 6px 18px rgba(0,0,0,0.10);
      backdrop-filter: blur(10px);
      transition: transform 0.2s ease, box-shadow 0.2s ease, background 1.5s ease, border-color 1.5s ease;
    }
    #screenMode .topic-card:hover {
      transform: translateY(-6px) scale(1.04);
      box-shadow: 0 12px 28px rgba(0,0,0,0.16);
      border-color: rgba(255,215,0,0.6);
    }
    body.dark-mode #screenMode .topic-card:hover {
      border-color: rgba(107,157,255,0.6);
    }
    #screenMode .topic-card:focus-visible {
      outline: 3px solid #ffd700; outline-offset: 3px;
    }
    #screenMode .topic-card:active { transform: translateY(-2px) scale(1.01); }

    /* ── Emoji (floating) ────────────────────────────────── */
    #screenMode .topic-emoji {
      font-size: 2.8rem;
      animation: topicFloat 3s ease-in-out infinite;
      display: block;
    }
    @keyframes topicFloat {
      0%,100% { transform: translateY(0);    }
      50%     { transform: translateY(-8px); }
    }
    /* Staggered delays so cards don't all float in sync */
    #screenMode .topic-card:nth-child(1)  .topic-emoji { animation-delay: 0.0s; }
    #screenMode .topic-card:nth-child(2)  .topic-emoji { animation-delay: 0.2s; }
    #screenMode .topic-card:nth-child(3)  .topic-emoji { animation-delay: 0.4s; }
    #screenMode .topic-card:nth-child(4)  .topic-emoji { animation-delay: 0.6s; }
    #screenMode .topic-card:nth-child(5)  .topic-emoji { animation-delay: 0.8s; }
    #screenMode .topic-card:nth-child(6)  .topic-emoji { animation-delay: 1.0s; }
    #screenMode .topic-card:nth-child(7)  .topic-emoji { animation-delay: 1.2s; }
    #screenMode .topic-card:nth-child(8)  .topic-emoji { animation-delay: 1.4s; }
    #screenMode .topic-card:nth-child(9)  .topic-emoji { animation-delay: 1.6s; }
    #screenMode .topic-card:nth-child(10) .topic-emoji { animation-delay: 1.8s; }
    #screenMode .topic-card:nth-child(11) .topic-emoji { animation-delay: 0.3s; }
    #screenMode .topic-card:nth-child(12) .topic-emoji { animation-delay: 0.5s; }
    #screenMode .topic-card:nth-child(13) .topic-emoji { animation-delay: 0.7s; }
    #screenMode .topic-card:nth-child(14) .topic-emoji { animation-delay: 0.9s; }
    #screenMode .topic-card:nth-child(15) .topic-emoji { animation-delay: 1.1s; }
    #screenMode .topic-card:nth-child(16) .topic-emoji { animation-delay: 1.3s; }
    #screenMode .topic-card:nth-child(17) .topic-emoji { animation-delay: 1.5s; }
    #screenMode .topic-card:nth-child(18) .topic-emoji { animation-delay: 1.7s; }
    #screenMode .topic-card:nth-child(19) .topic-emoji { animation-delay: 1.9s; }
    #screenMode .topic-card:nth-child(20) .topic-emoji { animation-delay: 0.1s; }

    /* ── Topic label ─────────────────────────────────────── */
    #screenMode .topic-label {
      font-size: 0.95rem; font-weight: 700;
      color: var(--text-primary); text-align: center;
      transition: color 1.5s ease-in-out;
    }

    /* ── Back link ───────────────────────────────────────── */
    #screenMode .back-link {
      color: var(--text-secondary); text-decoration: none;
      font-size: 0.95rem; margin-top: 4px;
      transition: color 0.3s ease;
    }
    #screenMode .back-link:hover { color: var(--text-primary); text-decoration: underline; }

    /* ── Responsive ──────────────────────────────────────── */
    @media (max-width: 600px) {
      #screenMode .topic-grid {
        grid-template-columns: repeat(auto-fill, minmax(110px,1fr));
        gap: 14px;
      }
      #screenMode .topic-card { padding: 16px 8px 12px; }
      #screenMode .topic-emoji { font-size: 2.2rem; }
    }

  </style>
</head>

// ── Per-topic paragraph rotation ────────────────────────────
var topicIndex = {};
TOPICS.forEach(function(t) { topicIndex[t.key] = 0; });

// ── Runtime state ────────────────────────────────────────────
var currentTopicKey   = "";
var stages            = [];
var sessionKeystrokes = [];

// ── Audio elements ───────────────────────────────────────────
var keySound      = document.getElementById("keypressSound");
var errorSound    = document.getElementById("wrongSound");

if (bgMusic) bgMusic.volume = 0.35;

// ── Build topic grid ─────────────────────────────────────────
var grid = document.getElementById("topicGrid");
TOPICS.forEach(function(topic) {
  var card = document.createElement("div");
  card.className = "topic-card";
  card.setAttribute("role", "button");
  card.setAttribute("tabindex", "0");
  card.setAttribute("aria-label", "Start " + topic.label + " practice");
  card.innerHTML =
    "<span class='topic-emoji'>" + topic.emoji + "</span>" +
    "<span class='topic-label'>" + topic.label + "</span>";
  card.addEventListener("click", function() { pickTopic(topic.key); });
  card.addEventListener("keydown", function(e) {
    if (e.key === "Enter" || e.key === " ") { e.preventDefault(); pickTopic(topic.key); }
  });
  grid.appendChild(card);
});

// ── Split paragraph into ~60-char stage lines ────────────────
function splitIntoStages(text) {
  var words = text.split(" ");
  var lines = [];
  var line  = "";
  words.forEach(function(word) {
    var candidate = line ? line + " " + word : word;
    if (candidate.length > 60 && line) { lines.push(line); line = word; }
    else line = candidate;
  });
  if (line) lines.push(line);
  return lines;
}

// ── Pick topic → fetch template → boot engine ────────────────
function pickTopic(key) {
  currentTopicKey = key;
  var pool  = POOL[key];
  var idx   = topicIndex[key] % pool.length;
  topicIndex[key]++;
  stages = splitIntoStages(pool[idx]);
  sessionKeystrokes = [];
  fetchAndBoot();
}

function fetchAndBoot() {
  fetch("levels/template.html")
    .then(function(res) {
      if (!res.ok) throw new Error("template.html not found");
      return res.text();
    })
    .then(function(html) {
      var parser = new DOMParser();
      var doc    = parser.parseFromString(html, "text/html");

      // Fix theme CSS link to use root-relative path
      var templateLink = doc.querySelector("link#theme");
      if (templateLink) {
        var existing = document.getElementById("theme");
        if (existing) {
          existing.href = templateLink.getAttribute("href").replace("../css/", "css/");
        }
      }

      // Remove duplicate shell elements, theme controls, and scripts from the template
      // so the practice page keeps theme state and event handling.
      doc.querySelectorAll(".sky-gradient, .stars-container, .cloud, .top-header, .theme-toggle, .vvlogo, .inclogo, audio").forEach(function(el) {
        el.remove();
      });
      doc.body.querySelectorAll("script").forEach(function(el) {
        el.remove();
      });

    // Fix paths for images/audio that use ../ inside levels/template.html
    doc.body.querySelectorAll('[src], [href]').forEach(function(el) {
      if (el.hasAttribute("src") && el.getAttribute("src").startsWith("../")) {
        el.setAttribute("src", el.getAttribute("src").substring(3));
      }
      if (el.hasAttribute("href") && el.getAttribute("href").startsWith("../") && el.id !== "theme") {
        el.setAttribute("href", el.getAttribute("href").substring(3));
      }
    });

      // Hide topic picker, inject typing screen from template
      document.getElementById("screenMode").style.display = "none";
      document.body.insertAdjacentHTML("beforeend", doc.body.innerHTML);

      // Wire Congratulations buttons:
      // "Restart" → replay same paragraph  |  "Next" → go back to topic picker
      var restartBtn = document.querySelector(".restart");
      var nextBtn    = document.querySelector(".next");
      if (restartBtn) {
        restartBtn.removeAttribute("href");
        var restartSpan = restartBtn.querySelector("span");
        if (restartSpan) restartSpan.textContent = "Same Topic";
        restartBtn.addEventListener("click", function(e) {
          e.preventDefault();
          // Step back one so getNextParagraph replays the same one
          topicIndex[currentTopicKey] = Math.max(0, topicIndex[currentTopicKey] - 1);
          reloadSession();
        });
      }
      if (nextBtn) {
        nextBtn.removeAttribute("href");
        var nextSpan = nextBtn.querySelector("span");
        if (nextSpan) nextSpan.textContent = "New Topic";
        nextBtn.addEventListener("click", function(e) {
          e.preventDefault();
          removeInjectedTemplate();
          document.getElementById("screenMode").style.display = "";
        });
      }

      bootEngine();
    })
    .catch(function(err) {
      alert("Could not load template.html.\nMake sure you are running on a local server.\n" + err.message);
    });
}

// ── Remove injected template so topic picker can show again ──
function removeInjectedTemplate() {
  var protectedIds = ["screenMode"];
  var protectedClasses = ["sky-gradient","stars-container","cloud","cloud1","cloud2","cloud3","cloud4","main-wrapper"];
  Array.from(document.body.children).forEach(function(el) {
    if (el.tagName === "SCRIPT") return;
    if (el.tagName === "AUDIO") return;
    if (protectedIds.indexOf(el.id) !== -1) return;
    if (el.classList.contains("main-wrapper")) return;
    el.remove();
  });
  // Also remove any keydown listeners added by bootEngine by replacing them
  // (done cleanly: bootEngine registers on document each time, old ones are GC'd)
  document.getElementById("screenMode").style.display = "";
}

// ── Reload session (same topic, next paragraph) ──────────────
window.reloadSession = function() {
  var pool = POOL[currentTopicKey];
  var idx  = topicIndex[currentTopicKey] % pool.length;
  topicIndex[currentTopicKey]++;
  stages = splitIntoStages(pool[idx]);
  sessionKeystrokes = [];
  currentStageG = 0;
  userInputG = "";
  startTimeG = null;
  hideCongrats();
  updateDisplayG();
};

// ─────────────────────────────────────────────────────────────
//  BOOT ENGINE  (mirrors main.js bootEngine exactly)
//  Runs after template.html has been injected into the page.
// ─────────────────────────────────────────────────────────────
function bootEngine() {

  var virtualShift = false;
  var virtualCaps  = false;

  // Show number row (template hides it by default)
  var numRow = document.getElementById("number-row");
  if (numRow) numRow.style.display = "";

  // DOM refs (all exist in template.html)
  var keysToTypeElement  = document.getElementById("keysToTypeSpan");
  var messageElement     = document.getElementById("message");
  var blury              = document.querySelector(".blur");
  var mascot             = document.querySelector(".mascot");
  var congo              = document.querySelector(".congo");
  var restart            = document.querySelector(".restart");
  var next               = document.querySelector(".next");
  var lnum               = document.querySelector(".lh");
  var rnum               = document.querySelector(".rh");
  var volButton          = document.querySelector(".volbt");

  // Prevent spacebar clicking the volume button
  if (volButton) {
    volButton.addEventListener("keydown", function(e) {
      if (e.key === " ") e.preventDefault();
    });
  }

  // ── Runtime state ─────────────────────────────────────────
  var currentStage     = 0;
  var userInput        = "";
  var soundEnabled     = false;
  var startTime        = null;
  var highlightEnabled = true;
  var highlightEl      = null;

  // Expose to reloadSession
  currentStageG = currentStage;
  userInputG    = userInput;
  startTimeG    = startTime;

  sessionKeystrokes = [];

  // ── Session save ──────────────────────────────────────────
  function generateId() {
    return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
  }

  function saveSession() {
    var totalChars = stages.reduce(function(a, s){ return a + s.length; }, 0);
    var totalWords = stages.reduce(function(a, s){ return a + s.trim().split(/\s+/).length; }, 0);
    var elapsed    = startTime ? Math.floor((Date.now() - startTime) / 1000) : 0;
    var correct    = sessionKeystrokes.filter(function(k){ return k.correct; }).length;
    var total      = sessionKeystrokes.length;
    var profileId  = localStorage.getItem("vv_activeProfile") || "guest";
    var session = {
      session_id        : generateId(),
      profileId         : profileId,
      timestamp         : new Date().toISOString(),
      mode              : "practise",
      topic             : currentTopicKey,
      total_time_seconds: elapsed,
      total_words       : totalWords,
      total_characters  : totalChars,
      wpm               : elapsed > 0 ? Math.round(totalWords / (elapsed / 60)) : 0,
      accuracy_percent  : total > 0 ? Math.round((correct / total) * 100) : 100,
      keystrokes        : sessionKeystrokes
    };
    var history = [];
    try { history = JSON.parse(localStorage.getItem("typingHistory")) || []; } catch(e){}
    history.push(session);
    localStorage.setItem("typingHistory", JSON.stringify(history));
  }

  // ── Congrats overlay ──────────────────────────────────────
function showCongrats() {
    clearNextKeyHighlight();

    // ── Compute stats ──────────────────────────────────────
    var _elapsed = startTime ? Math.floor((Date.now() - startTime) / 1000) : 0;
    var _correct = sessionKeystrokes.filter(function(k){ return k.correct; }).length;
    var _total   = sessionKeystrokes.length;
    var _words   = stages.reduce(function(a,s){ return a + s.trim().split(/\s+/).length; }, 0);
    var _wpm     = _elapsed > 0 ? Math.round(_words / (_elapsed / 60)) : 0;
    var _acc     = _total > 0 ? Math.round((_correct / _total) * 100) : 100;
    var _mm      = Math.floor(_elapsed / 60).toString().padStart(2,"0");
    var _ss      = (_elapsed % 60).toString().padStart(2,"0");

    var wpmEl  = document.getElementById("statWpm");
    var accEl  = document.getElementById("statAccuracy");
    var timeEl = document.getElementById("statTime");
    if (wpmEl)  wpmEl.textContent  = _wpm;
    if (accEl)  accEl.textContent  = _acc + "%";
    if (timeEl) timeEl.textContent = _mm + ":" + _ss;

    // ── Analyse errors ────────────────────────────────────
    var errorMap = {};
    sessionKeystrokes.forEach(function(k) {
      if (!k.correct) {
        var pair = k.expected + "→" + k.typed;
        errorMap[pair] = (errorMap[pair] || 0) + 1;
      }
    });

    var errorPairs = Object.keys(errorMap).map(function(pair) {
      return { pair: pair, count: errorMap[pair] };
    }).sort(function(a, b) { return b.count - a.count; }).slice(0, 3);

    var leftKeys  = "qwertasdfgzxcvb";
    var rightKeys = "yuiophjklnm";

    function getHand(ch) {
      if (leftKeys.indexOf(ch.toLowerCase()) !== -1) return "left";
      if (rightKeys.indexOf(ch.toLowerCase()) !== -1) return "right";
      return "other";
    }

    var majorErrors = 0;
    errorPairs.forEach(function(e) {
      var parts = e.pair.split("→");
      if (getHand(parts[0]) !== getHand(parts[1]) && getHand(parts[0]) !== "other" && getHand(parts[1]) !== "other") {
        majorErrors++;
      }
    });

    var feedbackEl = document.getElementById("errorFeedback");
    var tipEl      = document.getElementById("feedbackTip");

    if (feedbackEl) {
      if (errorPairs.length === 0) {
        feedbackEl.innerHTML = "<span class='fb-perfect'>✅ No mistakes! Perfect run!</span>";
      } else {
        var html = "<span class='fb-title'>😅 You mixed these up:</span><ul class='fb-list'>";
        errorPairs.forEach(function(e) {
          var parts = e.pair.split("→");
          html += "<li>Expected <kbd>" + parts[0] + "</kbd> but typed <kbd>" + parts[1] + "</kbd> — " + e.count + " time" + (e.count > 1 ? "s" : "") + "</li>";
        });
        html += "</ul>";
        feedbackEl.innerHTML = html;
      }
    }

    if (tipEl) {
      var tip = "";
      if (_acc === 100)        tip = "🌟 Absolutely perfect! You're a typing star!";
      else if (majorErrors > 0) tip = "🤝 Try to keep left hand on left keys and right hand on right keys!";
      else if (_acc >= 90)     tip = "💪 Almost perfect! Just a tiny mix-up. You've got this!";
      else if (_acc >= 75)     tip = "🎯 Good effort! Focus on the keys you mixed up above.";
      else if (_wpm < 10)      tip = "🐢 Take your time — accuracy matters more than speed right now!";
      else                     tip = "😊 Keep practising! Every session makes you better!";
      tipEl.textContent = tip;
    }

    [blury, mascot, congo, restart, next].forEach(function(el) {
      if (el) el.classList.remove("hidden");
    });
    if (applaudSound) applaudSound.play().catch(function(){});
  }

  window.hideCongrats = function hideCongrats() {
    [blury, mascot, congo, restart, next].forEach(function(el) {
      if (el) el.classList.add("hidden");
    });
  };
  var hideCongrats = window.hideCongrats;

  // ── Next-key highlight ────────────────────────────────────
  function clearNextKeyHighlight() {
    if (highlightEl) { highlightEl.classList.remove("next-key-highlight"); highlightEl = null; }
    var sl = document.querySelector('[data-key="16"]');
    var sr = document.querySelector('[data-key="16-R"]');
    if (sl) sl.classList.remove("next-key-highlight");
    if (sr) sr.classList.remove("next-key-highlight");
  }

  function applyNextKeyHighlight(char) {
    clearNextKeyHighlight();
    if (!highlightEnabled) return;

    var leftKeys  = ['q','w','e','r','t','a','s','d','f','g','z','x','c','v','b'];
    var rightKeys = ['y','u','i','o','p','h','j','k','l','n','m'];
    var lShift    = ['!','@','#','$','%'];
    var rShift    = ['^','&','*','(',')','+','_','~',':','"','?','>'];
    var isUpper   = char.length === 1 && /[A-Z]/.test(char);
    var lc        = char.toLowerCase();
    var target;

    if      (char === " ")                target = document.querySelector('[data-key="32"]');
    else if (char === "'" || char === '"') target = document.querySelector('[data-key="222"]');
    else                                  target = document.querySelector('[data-char*="' + char.toUpperCase() + '"]');

    if (target) { target.classList.add("next-key-highlight"); highlightEl = target; }

    if      (isUpper && leftKeys.indexOf(lc) !== -1)  document.querySelector('[data-key="16-R"]') && document.querySelector('[data-key="16-R"]').classList.add("next-key-highlight");
    else if (isUpper && rightKeys.indexOf(lc) !== -1) document.querySelector('[data-key="16"]')   && document.querySelector('[data-key="16"]').classList.add("next-key-highlight");
    else if (lShift.indexOf(char) !== -1)             document.querySelector('[data-key="16-R"]') && document.querySelector('[data-key="16-R"]').classList.add("next-key-highlight");
    else if (rShift.indexOf(char) !== -1)             document.querySelector('[data-key="16"]')   && document.querySelector('[data-key="16"]').classList.add("next-key-highlight");
  }

  // ── Update display (paragraph mode — same as main.js) ─────
  function updateDisplay() {
    var correctText = stages[currentStage];
    var lastVisible = Math.min(currentStage + 4, stages.length);
    var html = "";

    // Active line — char by char
    var lineHtml = "";
    for (var i = 0; i < correctText.length; i++) {
      var ch = correctText[i] === " " ? "&nbsp;" : correctText[i];
      if      (i < userInput.length)   lineHtml += "<span class='" + (userInput[i] === correctText[i] ? "correct" : "wrong") + "'>" + ch + "</span>";
      else if (i === userInput.length) lineHtml += "<span class='cursor'>"  + ch + "</span>";
      else                             lineHtml += "<span class='pending'>" + ch + "</span>";
    }
    html += "<div class='paraLine active'>" + lineHtml + "</div>";

    // Upcoming lines — dimmed
    for (var s = currentStage + 1; s < lastVisible; s++) {
      var safe = stages[s].replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
      html += "<div class='paraLine'>" + safe + "</div>";
    }

    keysToTypeElement.innerHTML = html;
    messageElement.textContent  = "Stage " + (currentStage + 1) + " of " + stages.length;

    if (userInput.length < correctText.length) {
      var nextChar = correctText[userInput.length];
      applyNextKeyHighlight(nextChar);
      updateHands(nextChar);
    } else {
      clearNextKeyHighlight();
      if (lnum) lnum.src = "assets/images/letters/left_idle.webp";
      if (rnum) rnum.src = "assets/images/letters/right_idle.webp";
    }
  }

  // Expose for reloadSession
  window.updateDisplayG = function() {
    currentStage = currentStageG;
    userInput    = userInputG;
    startTime    = startTimeG;
    hideCongrats();
    updateDisplay();
  };

  // ── Press key visual ──────────────────────────────────────
  function pressKey(char) {
    var target = (char === "'" || char === '"')
      ? document.querySelector('[data-key="222"]')
      : char === " "
        ? document.querySelector('[data-key="32"]')
        : document.querySelector('[data-char*="' + char.toUpperCase() + '"]');
    if (!target) return;
    target.setAttribute("data-pressed","on");
    setTimeout(function() { target.removeAttribute("data-pressed"); }, 200);
  }

  // ── Hand positioning (exact copy from main.js) ────────────
function applyPos(el, pos) {
    if (!pos) return;
    el.style.left      = pos.left      !== undefined ? pos.left      : "";
    el.style.right     = pos.right     !== undefined ? pos.right     : "";
    el.style.top       = pos.top       !== undefined ? pos.top       : "";
    el.style.bottom    = pos.bottom    !== undefined ? pos.bottom    : "";
    el.style.transform = pos.transform !== undefined ? pos.transform : "";
  }

  function updateHands(key) {
    if (!lnum || !rnum) return;

    var leftShiftKey  = document.querySelector('[data-key="16"]');
    var rightShiftKey = document.querySelector('[data-key="16-R"]');

    lnum.src = "assets/images/letters/left_idle.webp";
    rnum.src = "assets/images/letters/right_idle.webp";
    if (leftShiftKey)  leftShiftKey.style.backgroundColor  = "";
    if (rightShiftKey) rightShiftKey.style.backgroundColor = "";

    var char    = key.toLowerCase();
    var isUpper = key !== " " && key === key.toUpperCase() && key.length === 1 && /[A-Z]/.test(key);

    var leftKeys  = ['q','w','e','r','t','a','s','d','f','g','z','x','c','v','b','1','2','3','4','5','!','@','#','$','%'];
    var rightKeys = ['y','u','i','o','p','h','j','k','l','n','m',';','<','>','"',"'",'?',',','.','/','-','=','6','7','8','9','0','_','+','^','&','*','(',')'];

    var leftHandPos = {
      q:{left:"10vw",bottom:"-46vh"},w:{left:"10vw",bottom:"-45vh"},e:{left:"10vw",bottom:"-45vh"},
      r:{left:"10vw",bottom:"-45vh"},t:{left:"12vw",bottom:"-45vh"},a:{left:"10vw",bottom:"-43vh"},
      s:{left:"10vw",bottom:"-45vh"},d:{left:"11vw",bottom:"-45vh"},f:{left:"12vw",bottom:"-45vh"},
      g:{left:"12vw",bottom:"-45vh"},z:{left:"10vw",bottom:"-48vh"},x:{left:"12vw",bottom:"-48vh"},
      c:{left:"12vw",bottom:"-45vh"},v:{left:"12vw",bottom:"-48vh"},b:{left:"12vw",bottom:"-48vh"},
      "1":{left:"10vw",bottom:"-43vh"},"2":{left:"10vw",bottom:"-43vh"},"3":{left:"10vw",bottom:"-45vh"},
      "4":{left:"10vw",bottom:"-45vh"},"5":{left:"10vw",bottom:"-45vh"},
      "!":{left:"10vw",bottom:"-43vh"},"@":{left:"10vw",bottom:"-43vh"},"#":{left:"10vw",bottom:"-45vh"},
      "$":{left:"10vw",bottom:"-45vh"},"%":{left:"10vw",bottom:"-45vh"}
    };

    var rightHandPos = {
      y:{right:"14vw",bottom:"-48vh"},u:{right:"13vw",bottom:"-45vh"},i:{right:"13vw",bottom:"-45vh"},
      o:{right:"13vw",bottom:"-45vh"},p:{right:"13vw",bottom:"-45vh"},h:{right:"14vw",bottom:"-45vh"},
      j:{right:"14vw",bottom:"-45vh"},k:{right:"14vw",bottom:"-45vh"},l:{right:"13vw",bottom:"-45vh"},
      n:{right:"13vw",bottom:"-45vh"},m:{right:"12vw",bottom:"-49vh"},
      ";":{right:"13vw",bottom:"-45vh"},"'":{right:"12vw",bottom:"-45vh"},
      ",":{right:"13vw",bottom:"-45vh"},".":{right:"13vw",bottom:"-45vh"},
      "/":{right:"12vw",bottom:"-48vh"},"-":{right:"17vw",bottom:"-48vh"},
      "=":{right:"17vw",bottom:"-48vh"},":":{right:"17vw",bottom:"-45vh"},
      '"':{right:"12vw",bottom:"-45vh"},">":{right:"13vw",bottom:"-45vh"},
      "?":{right:"12vw",bottom:"-45vh"},
      "6":{right:"13vw",bottom:"-45vh"},"7":{right:"13vw",bottom:"-45vh"},
      "8":{right:"12vw",bottom:"-45vh"},"9":{right:"11vw",bottom:"-45vh"},
      "0":{right:"12vw",bottom:"-45vh"},space:{right:"14vw",bottom:"-45vh"},
      "^":{right:"14vw",bottom:"-45vh"},"&":{right:"13vw",bottom:"-45vh"},
      "*":{right:"12vw",bottom:"-45vh"},"(":{right:"11vw",bottom:"-45vh"},
      ")":{right:"12vw",bottom:"-45vh"}
    };

    var fileNameMap = {
      "?":"questionmark",".":"fullstop","/":"questionmark",">":"fullstop","<":",",":":";",'"':"'",
      "!":"1","@":"2","#":"3","$":"4","%":"5","^":"6","&":"7","*":"8","(":"9",")":"0","_":"-","+":"="
    };

    if (leftKeys.indexOf(char) !== -1) {
      lnum.src = "assets/images/letters/" + (fileNameMap[char] || char) + ".webp";
      applyPos(lnum, leftHandPos[char]);
    } else if (rightKeys.indexOf(char) !== -1) {
      rnum.src = "assets/images/letters/" + (fileNameMap[char] || char) + ".webp";
      applyPos(rnum, rightHandPos[char]);
    } else if (key === " ") {
      rnum.src = "assets/images/letters/space.webp";
      applyPos(rnum, rightHandPos["space"]);
    }

    var leftShiftSymbols  = ['!','@','#','$','%'];
    var rightShiftSymbols = ['^','&','*','(',')','+','_','~',':','"','?','>','<'];
    var leftShiftPos  = { left: "10vw",  bottom: "-45vh" };
    var rightShiftPos = { right: "12vw", bottom: "-45vh" };

    if (isUpper) {
      if (leftKeys.indexOf(char) !== -1) {
        rnum.src = "assets/images/letters/right_shift.webp";
        applyPos(rnum, rightShiftPos);
      } else if (rightKeys.indexOf(char) !== -1) {
        lnum.src = "assets/images/letters/left_shift.webp";
        applyPos(lnum, leftShiftPos);
      }
    }
    if (leftShiftSymbols.indexOf(key) !== -1) {
      rnum.src = "assets/images/letters/right_shift.webp";
      applyPos(rnum, rightShiftPos);
    }
    if (rightShiftSymbols.indexOf(key) !== -1) {
      lnum.src = "assets/images/letters/left_shift.webp";
      applyPos(lnum, leftShiftPos);
    }
  }

  // ── Sound toggle ──────────────────────────────────────────
  window.toggleSound = function() {
    soundEnabled = !soundEnabled;
    localStorage.setItem("sound-enabled", soundEnabled ? "true" : "false");
    var toggleEl = document.getElementById("soundToggle");
    var volImg   = document.querySelector(".vol");
    if (toggleEl) toggleEl.textContent = "Sound: " + (soundEnabled ? "On" : "Off");
    if (volImg)   volImg.src = soundEnabled ? "assets/images/volume.png" : "assets/images/mute.png";
    if (bgMusic) {
      if (soundEnabled) bgMusic.play().catch(function(){});
      else bgMusic.pause();
    }
  };

  // ── Keyboard resize ───────────────────────────────────────
  var keyboard = document.querySelector(".keyboard");
  function resizeKeyboard() {
    if (keyboard && keyboard.parentNode)
      keyboard.style.fontSize = keyboard.parentNode.clientWidth / 100 + "px";
  }
  window.addEventListener("resize", resizeKeyboard);
  resizeKeyboard();

  // ── Settings dialog ───────────────────────────────────────
  var settingsBtn     = document.getElementById("settingsBtn");
  var settingsOverlay = document.getElementById("settingsOverlay");
  var settingsClose   = document.getElementById("settingsClose");
  var toggleHighlight = document.getElementById("toggleHighlight");
  var toggleHands     = document.getElementById("toggleHands");

  if (settingsBtn)     settingsBtn.addEventListener("click",  function() { settingsOverlay.classList.add("open"); });
  if (settingsClose)   settingsClose.addEventListener("click", function() { settingsOverlay.classList.remove("open"); });
  if (settingsOverlay) settingsOverlay.addEventListener("click", function(e) { if (e.target === this) this.classList.remove("open"); });
  if (toggleHands) {
    toggleHands.addEventListener("change", function() {
      if (lnum) lnum.style.visibility = this.checked ? "visible" : "hidden";
      if (rnum) rnum.style.visibility = this.checked ? "visible" : "hidden";
    });
  }
  if (toggleHighlight) {
    toggleHighlight.addEventListener("change", function() {
      highlightEnabled = this.checked;
      if (!highlightEnabled) clearNextKeyHighlight();
      else if (stages[currentStage] && userInput.length < stages[currentStage].length)
        applyNextKeyHighlight(stages[currentStage][userInput.length]);
    });
  }

  // ── Keydown handler (core typing engine) ─────────────────
  if (window.activeTypingHandler) {
    document.removeEventListener("keydown", window.activeTypingHandler);
  }

  window.activeTypingHandler = function(event) {
    // Only active when typing screen is showing
    if (document.getElementById("screenMode").style.display !== "none") return;

    var typedChar = event.key;
    if (typedChar.length !== 1 && typedChar !== "Backspace" && typedChar !== " ") return;

    // Backspace
    if (typedChar === "Backspace") {
      userInput = userInput.slice(0, -1);
      if (sessionKeystrokes.length > 0) sessionKeystrokes.pop();
      updateDisplay();
      return;
    }

    if (userInput.length >= stages[currentStage].length) return;

    if (!startTime) { startTime = Date.now(); startTimeG = startTime; }

    var expectedChar = stages[currentStage][userInput.length];
    var isCorrect    = typedChar === expectedChar;

    if (isCorrect) {
      userInput += expectedChar;
      if (soundEnabled && keySound) { keySound.currentTime = 0; keySound.play().catch(function(){}); }
      pressKey(expectedChar);
      sessionKeystrokes.push({ expected: expectedChar, typed: typedChar, correct: true });
      updateDisplay();

      // Stage complete?
      if (userInput === stages[currentStage]) {
        keysToTypeElement.classList.add("slide-out-left");
        setTimeout(function() {
          currentStage++;
          if (currentStage < stages.length) {
            userInput = "";
            hideCongrats();
            keysToTypeElement.classList.remove("slide-out-left");
            updateDisplay();
            keysToTypeElement.classList.add("slide-in-right");
            setTimeout(function() { keysToTypeElement.classList.remove("slide-in-right"); }, 300);
          } else {
            keysToTypeElement.classList.remove("slide-out-left");
            messageElement.textContent = "Congratulations! You have completed all stages.";
            keysToTypeElement.innerHTML = "";
            saveSession();
            showCongrats();
          }
        }, 200);
      }

    } else {
      if (soundEnabled && errorSound) { errorSound.currentTime = 0; errorSound.play().catch(function(){}); }
      messageElement.textContent = 'Wrong key. Expected "' + expectedChar + '", typed "' + typedChar + '". Try again.';

      var keyEl = document.querySelector('[data-char*="' + typedChar.toUpperCase() + '"]');
      if (keyEl) {
        keyEl.style.backgroundColor = "#EF5350";
        keyEl.style.transform        = "scale(0.9)";
        setTimeout(function() {
          keyEl.style.backgroundColor = "";
          keyEl.style.transform        = "scale(1)";
        }, 300);
      }
      sessionKeystrokes.push({ expected: expectedChar, typed: typedChar, correct: false });
    }
  };

  document.addEventListener("keydown", window.activeTypingHandler);

  // ── Initialise ────────────────────────────────────────────
  hideCongrats();
  updateDisplay();

} // end bootEngine()


// ─────────────────────────────────────────────────────────────
//  THEME — now handled by FAB (fab.js applyTheme function)
//  This just applies the stored preference on load
// ─────────────────────────────────────────────────────────────
(function() {
  var storedTheme = localStorage.getItem("type-tutor-theme-preference") || "light";
  var isDark      = storedTheme === "dark";
  var themeLink   = document.getElementById("theme");
  document.body.classList.toggle("dark-mode", isDark);
  if (themeLink) themeLink.href = "css/" + (isDark ? "black" : "color") + ".css";
})();


// ── Global Key Styling (Replaces injected template script) ──
document.addEventListener("keydown", function(e) {
  if (!e.key) return;
  var keyEl = document.querySelector('.key[data-key="' + e.key.toLowerCase() + '"]');
  if (keyEl) keyEl.classList.add("active");
});
document.addEventListener("keyup", function(e) {
  if (!e.key) return;
  var keyEl = document.querySelector('.key[data-key="' + e.key.toLowerCase() + '"]');
  if (keyEl) keyEl.classList.remove("active");
});

</script>
<script src="js/fab.js"></script>
<script src="js/sidebar.js"></script>
</body>
